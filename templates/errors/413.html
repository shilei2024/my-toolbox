{% extends "base.html" %}
{% block title %}文件太大 — {{ site_name }}{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-file-earmark-x text-warning" style="font-size: 4rem;"></i>
  <h1 class="mt-3">文件太大</h1>
  <p class="text-muted">单文件最大 {{ limit_mb }} MB，请压缩后重试。</p>
  <a href="javascript:history.back()" class="btn btn-outline-secondary">返回</a>
</div>
{% endblock %}
