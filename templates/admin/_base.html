{% extends "base.html" %}
{% block title %}后台 — {{ site_name }}{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-md-3">
    <div class="list-group shadow-sm">
      <a href="{{ url_for('admin.dashboard') }}" class="list-group-item list-group-item-action {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> 仪表盘
      </a>
      <a href="{{ url_for('admin.users') }}" class="list-group-item list-group-item-action {% if request.endpoint in ['admin.users', 'admin.toggle_user', 'admin.set_user_limit'] %}active{% endif %}">
        <i class="bi bi-people"></i> 用户
      </a>
      <a href="{{ url_for('admin.tools') }}" class="list-group-item list-group-item-action {% if request.endpoint in ['admin.tools', 'admin.toggle_tool'] %}active{% endif %}">
        <i class="bi bi-grid"></i> 工具
      </a>
      <a href="{{ url_for('admin.logs') }}" class="list-group-item list-group-item-action {% if request.endpoint == 'admin.logs' %}active{% endif %}">
        <i class="bi bi-journal-text"></i> 日志
      </a>
      <a href="{{ url_for('admin.settings') }}" class="list-group-item list-group-item-action {% if request.endpoint == 'admin.settings' %}active{% endif %}">
        <i class="bi bi-gear"></i> 设置
      </a>
    </div>
  </div>
  <div class="col-md-9">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
