<p class="text-muted">SQL 语句美化、压缩，自动检测语句数量。</p>

<div class="mb-3">
  <textarea id="sqlInput" class="form-control font-monospace" rows="8" placeholder="select * from users where id = 1 order by created_at desc">SELECT u.id, u.email, COUNT(o.id) as order_count FROM users u LEFT JOIN orders o ON o.user_id = u.id WHERE u.is_active = 1 GROUP BY u.id, u.email HAVING COUNT(o.id) > 5 ORDER BY order_count DESC LIMIT 10</textarea>
</div>

<div class="d-flex gap-2 mb-3">
  <button id="formatBtn" class="btn btn-primary"><i class="bi bi-magic"></i> 美化</button>
  <button id="compressBtn" class="btn btn-outline-secondary"><i class="bi bi-arrows-collapse"></i> 压缩</button>
  <button id="copyBtn" class="btn btn-outline-success ms-auto"><i class="bi bi-clipboard"></i> 复制结果</button>
</div>

<div id="errorBox" class="alert alert-danger d-none"></div>

<div class="mb-3">
  <div class="d-flex justify-content-between">
    <label class="form-label text-muted small">结果</label>
    <small class="text-muted" id="stmtInfo"></small>
  </div>
  <textarea id="sqlOutput" class="form-control font-monospace" rows="10" readonly style="background:#f8f9fa;"></textarea>
</div>

<script>
(function(){
  const CSRF = document.querySelector('meta[name="csrf-token"]').content;
  const inp = document.getElementById('sqlInput'), out = document.getElementById('sqlOutput');

  async function send(action){
    const sql = inp.value.trim();
    if(!sql) return;
    document.getElementById('errorBox').classList.add('d-none');
    try {
      const fd = new FormData(); fd.set('sql', sql); fd.set('action', action); fd.set('csrf_token', CSRF);
      const r = await fetch('{{ url_for("sql_formatter.process") }}', {method:'POST', body:fd});
      const d = await r.json();
      if(d.ok){
        out.value = d.result;
        document.getElementById('stmtInfo').textContent = `${d.statements} 条语句`;
      } else {
        document.getElementById('errorBox').textContent = d.error;
        document.getElementById('errorBox').classList.remove('d-none');
      }
    } catch(e){ document.getElementById('errorBox').textContent='请求失败: '+e; document.getElementById('errorBox').classList.remove('d-none'); }
  }

  document.getElementById('formatBtn').onclick = ()=>send('format');
  document.getElementById('compressBtn').onclick = ()=>send('compress');
  document.getElementById('copyBtn').onclick = function(){
    if(out.value){ navigator.clipboard.writeText(out.value); this.innerHTML='<i class="bi bi-check"></i> 已复制'; setTimeout(()=>{this.innerHTML='<i class="bi bi-clipboard"></i> 复制结果'},1500); }
  };
  send('format');
})();
</script>
