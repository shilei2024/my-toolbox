<p class="text-muted">批量生成 UUID，可切换大小写，一键复制。</p>

<div class="row g-2 mb-3 align-items-end">
  <div class="col-md-3">
    <label class="form-label">数量</label>
    <input type="number" id="uuidCount" class="form-control" value="1" min="1" max="500" />
  </div>
  <div class="col-md-3">
    <label class="form-label">版本</label>
    <select id="uuidVer" class="form-select"><option value="4">v4 (随机)</option><option value="1">v1 (时间)</option></select>
  </div>
  <div class="col-md-3">
    <div class="form-check mt-4">
      <input type="checkbox" id="uuidUpper" class="form-check-input" />
      <label class="form-check-label">大写</label>
    </div>
  </div>
  <div class="col-md-3">
    <button id="genBtn" class="btn btn-primary w-100"><i class="bi bi-fingerprint"></i> 生成</button>
  </div>
</div>

<div id="uuidError" class="alert alert-danger d-none"></div>

<div class="card bg-light">
  <div class="card-body d-none" id="uuidResult">
    <div class="d-flex justify-content-between mb-2">
      <small class="text-muted">已生成 <span id="uuidCountSpan">0</span> 个 UUID</small>
      <button id="copyAll" class="btn btn-outline-success btn-sm"><i class="bi bi-clipboard"></i> 复制全部</button>
    </div>
    <textarea id="uuidList" class="form-control font-monospace" rows="10" readonly style="resize:vertical;background:#fff;"></textarea>
  </div>
</div>

<script>
(function() {
  const CSRF = document.querySelector('meta[name="csrf-token"]').content;
  document.getElementById('genBtn').onclick = async function() {
    const cnt = parseInt(document.getElementById('uuidCount').value) || 1;
    const ver = document.getElementById('uuidVer').value;
    const upper = document.getElementById('uuidUpper').checked ? '1' : '0';
    document.getElementById('uuidError').classList.add('d-none');
    document.getElementById('uuidResult').classList.add('d-none');
    try {
      const fd = new FormData(); fd.set('count', cnt); fd.set('version', ver); fd.set('uppercase', upper); fd.set('csrf_token', CSRF);
      const r = await fetch('{{ url_for("uuid_gen.process") }}', { method:'POST', body:fd });
      const d = await r.json();
      if(d.ok) {
        document.getElementById('uuidList').value = d.uuids.join('\n');
        document.getElementById('uuidCountSpan').textContent = d.count;
        document.getElementById('uuidResult').classList.remove('d-none');
      } else {
        document.getElementById('uuidError').textContent = d.error;
        document.getElementById('uuidError').classList.remove('d-none');
      }
    } catch(e) { document.getElementById('uuidError').textContent = '请求失败: '+e; document.getElementById('uuidError').classList.remove('d-none'); }
  };
  document.getElementById('copyAll').onclick = function() {
    const v = document.getElementById('uuidList').value;
    if(v) { navigator.clipboard.writeText(v); this.innerHTML='<i class="bi bi-check"></i> 已复制'; setTimeout(()=>{this.innerHTML='<i class="bi bi-clipboard"></i> 复制全部'},1500); }
  };
})();
</script>
