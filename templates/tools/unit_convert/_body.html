<p class="text-muted">长度、重量、温度、存储、时间单位互转。</p>

<div class="mb-3">
  <label class="form-label">类别</label>
  <select id="category" class="form-select" style="max-width:200px;">
    <option value="length">长度</option>
    <option value="weight">重量</option>
    <option value="temperature">温度</option>
    <option value="storage">存储容量</option>
    <option value="time">时间</option>
  </select>
</div>

<div class="row g-2 align-items-end mb-3">
  <div class="col-md-3">
    <label class="form-label">数值</label>
    <input type="number" id="value" class="form-control" value="1" step="any" />
  </div>
  <div class="col-md-3">
    <label class="form-label">从</label>
    <select id="fromUnit" class="form-select"></select>
  </div>
  <div class="col-md-1 text-center pt-4"><i class="bi bi-arrow-right"></i></div>
  <div class="col-md-3">
    <label class="form-label">到</label>
    <select id="toUnit" class="form-select"></select>
  </div>
  <div class="col-md-2">
    <button id="convertBtn" class="btn btn-success w-100"><i class="bi bi-arrow-repeat"></i> 换算</button>
  </div>
</div>

<div id="errorBox" class="alert alert-danger d-none"></div>
<div id="result" class="card bg-light d-none">
  <div class="card-body text-center">
    <div class="display-6 fw-bold" id="resultValue">—</div>
    <div class="text-muted" id="resultLabel">—</div>
  </div>
</div>

<script>
(function(){
  const CSRF = document.querySelector('meta[name="csrf-token"]').content;
  const UNITS = {
    length: ['mm','cm','m','km','in','ft','yd','mi'],
    weight: ['mg','g','kg','t','oz','lb'],
    temperature: ['C','F','K'],
    storage: ['B','KB','MB','GB','TB','PB'],
    time: ['ms','s','min','h','d','w','y'],
  };
  const LABELS = {C:'°C',F:'°F',K:'K',min:'分钟'};
  function label(u){ return LABELS[u] || u; }

  function updateUnits(){
    const cat = document.getElementById('category').value;
    const units = UNITS[cat];
    const from = document.getElementById('fromUnit');
    const to = document.getElementById('toUnit');
    from.innerHTML = units.map(u=>`<option value="${u}">${label(u)}</option>`).join('');
    to.innerHTML = units.map((u,i)=>`<option value="${u}" ${i===1?'selected':''}>${label(u)}</option>`).join('');
  }
  document.getElementById('category').onchange = updateUnits;
  updateUnits();

  document.getElementById('convertBtn').onclick = async function(){
    const fd = new FormData();
    fd.set('category', document.getElementById('category').value);
    fd.set('value', document.getElementById('value').value);
    fd.set('from_unit', document.getElementById('fromUnit').value);
    fd.set('to_unit', document.getElementById('toUnit').value);
    fd.set('csrf_token', CSRF);
    document.getElementById('errorBox').classList.add('d-none');
    try {
      const r = await fetch('{{ url_for("unit_convert.process") }}', {method:'POST', body:fd});
      const d = await r.json();
      if(d.ok){
        document.getElementById('resultValue').textContent = d.result;
        const fromU = label(document.getElementById('fromUnit').value);
        const toU = label(document.getElementById('toUnit').value);
        const val = document.getElementById('value').value;
        document.getElementById('resultLabel').textContent = `${val} ${fromU} = ${d.result} ${toU}`;
        document.getElementById('result').classList.remove('d-none');
      } else {
        document.getElementById('errorBox').textContent = d.error;
        document.getElementById('errorBox').classList.remove('d-none');
      }
    } catch(e){ document.getElementById('errorBox').textContent='请求失败: '+e; document.getElementById('errorBox').classList.remove('d-none'); }
  };
})();
</script>
