<p class="text-muted">文本、图片或文件 ↔ Base64 编解码。</p>

<ul class="nav nav-tabs mb-3">
  <li class="nav-item"><button class="nav-link active" data-mode="text">文本</button></li>
  <li class="nav-item"><button class="nav-link" data-mode="file">文件</button></li>
  <li class="nav-item"><button class="nav-link" data-mode="image">图片 Data URI</button></li>
</ul>

<form id="b64Form" method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  <input type="hidden" name="mode" id="b64Mode" value="text" />

  <div class="row g-2 mb-3">
    <div class="col-md-6">
      <button type="submit" id="encodeBtn" class="btn btn-primary w-100"><i class="bi bi-lock"></i> 编码</button>
    </div>
    <div class="col-md-6">
      <button type="submit" id="decodeBtn" class="btn btn-outline-secondary w-100"><i class="bi bi-unlock"></i> 解码</button>
    </div>
  </div>

  <div class="mb-3" id="textInputArea">
    <textarea name="text" class="form-control font-monospace" rows="6" placeholder="输入要编码的文本…"></textarea>
  </div>
  <div class="mb-3 d-none" id="fileInputArea">
    <input type="file" name="file" class="form-control" />
  </div>

  <div id="errorBox" class="alert alert-danger d-none"></div>

  <div class="mb-3">
    <label class="form-label text-muted small">结果</label>
    <textarea id="b64Output" class="form-control font-monospace" rows="6" readonly style="background:#f8f9fa;"></textarea>
  </div>
  <button type="button" id="copyResult" class="btn btn-outline-success btn-sm"><i class="bi bi-clipboard"></i> 复制</button>

  <div id="decodedPreview" class="mt-3 d-none">
    <a id="decodedDownloadLink" class="btn btn-sm btn-success" download><i class="bi bi-download"></i> 下载解码文件</a>
  </div>
</form>

<script>
(function() {
  const CSRF = document.querySelector('meta[name="csrf-token"]').content;
  const modeEl = document.getElementById('b64Mode');

  document.querySelectorAll('.nav-tabs .nav-link').forEach(btn => {
    btn.onclick = function() {
      document.querySelectorAll('.nav-tabs .nav-link').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      modeEl.value = this.dataset.mode;
      document.getElementById('textInputArea').classList.toggle('d-none', this.dataset.mode !== 'text');
      document.getElementById('fileInputArea').classList.toggle('d-none', this.dataset.mode === 'text');
      document.getElementById('decodedPreview').classList.add('d-none');
    };
  });

  document.getElementById('b64Form').onsubmit = async function(e) {
    e.preventDefault();
    const btn = e.submitter;
    const action = btn.id === 'encodeBtn' ? 'encode' : 'decode';
    const fd = new FormData(this);
    fd.set('action', action);
    fd.set('csrf_token', CSRF);
    document.getElementById('errorBox').classList.add('d-none');
    document.getElementById('decodedPreview').classList.add('d-none');
    try {
      const r = await fetch('{{ url_for("base64.process") }}', { method:'POST', body:fd });
      const d = await r.json();
      if (d.ok) {
        document.getElementById('b64Output').value = d.result || '';
        if (d.url) {
          document.getElementById('decodedDownloadLink').href = d.url;
          document.getElementById('decodedPreview').classList.remove('d-none');
        }
      } else {
        document.getElementById('errorBox').textContent = d.error;
        document.getElementById('errorBox').classList.remove('d-none');
        document.getElementById('b64Output').value = '';
      }
    } catch(e) { document.getElementById('errorBox').textContent = '请求失败: '+e; document.getElementById('errorBox').classList.remove('d-none'); }
  };

  document.getElementById('copyResult').onclick = function() {
    const v = document.getElementById('b64Output').value;
    if (v) { navigator.clipboard.writeText(v); this.innerHTML='<i class="bi bi-check"></i> 已复制'; setTimeout(()=>{this.innerHTML='<i class="bi bi-clipboard"></i> 复制'},1500); }
  };
})();
</script>
