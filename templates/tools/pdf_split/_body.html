<p class="text-muted">
  上传一个 PDF，输入要提取的页码范围，例如 <code>1-3,5,7-9</code>。
  想拆成多个文件，用分号分隔，例如 <code>1-3; 5; 7-9</code> 会生成三个 PDF。
</p>

<form id="splitForm" action="{{ url_for('pdf_split.process') }}" method="post"
      enctype="multipart/form-data" data-async="1" data-preview="pdf">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

  <div class="mb-3">
    <label class="form-label">选择 PDF</label>
    <input type="file" name="pdf" accept="application/pdf,.pdf" class="form-control" required />
  </div>

  <div class="mb-3">
    <label class="form-label">页码范围</label>
    <input type="text" name="ranges" id="ranges" class="form-control" placeholder="例如 1-3,5,7-9 或 1-3; 5; 7-9" required />
    <div id="rangesHelp" class="form-text text-muted">
      支持单段 <code>1-3</code>、多段 <code>1-3,5,7-9</code>。
      用 <code>;</code> 分隔可拆成多个文件，例如 <code>1-3; 5; 7-9</code>。
      超出范围的页码会被忽略。
    </div>
  </div>

  <button id="submitBtn" type="submit" class="btn btn-success btn-lg" disabled>
    <i class="bi bi-scissors"></i> 拆分 PDF
  </button>
  <span id="busy" class="ms-2 text-muted d-none">
    <span class="spinner-border spinner-border-sm"></span> 拆分中…
  </span>
</form>

<div id="errorBox" class="alert alert-danger mt-3 d-none"></div>

<div id="result" class="card border-success shadow-sm mt-4 d-none">
  <div class="card-body">
    <h5 class="card-title text-success mb-3">
      <i class="bi bi-check-circle-fill"></i> 拆分完成
    </h5>
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <div id="resultPreview"></div>
      <div class="flex-grow-1" style="min-width: 200px;">
        <div class="text-muted small">主文件</div>
        <code id="resultFilename" class="d-block text-truncate user-select-all" style="max-width: 100%;"></code>
        <div class="text-muted small mt-1">大小：<span id="resultSize">—</span></div>
      </div>
      <div class="d-flex flex-column gap-2">
        <a id="downloadLink" class="btn btn-success btn-sm" download>
          <i class="bi bi-download"></i> 下载主文件
        </a>
        <a id="openLink" class="btn btn-outline-secondary btn-sm" target="_blank" rel="noopener">
          <i class="bi bi-box-arrow-up-right"></i> 在新标签打开
        </a>
        <button id="resetBtn" type="button" class="btn btn-link btn-sm text-muted p-0">
          <i class="bi bi-arrow-counterclockwise"></i> 再拆分一次
        </button>
      </div>
    </div>

    <div id="resultFilesListWrap" class="mt-4 d-none">
      <h6 class="text-muted text-uppercase small mb-2">所有文件（按范围分）</h6>
      <ul id="resultFilesList" class="list-group list-group-flush"></ul>
    </div>
  </div>
</div>
