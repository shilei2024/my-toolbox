<p class="text-muted">输入正则表达式和测试文本，实时查看匹配结果和捕获组。</p>

<div class="mb-3">
  <label class="form-label">正则表达式</label>
  <div class="input-group">
    <span class="input-group-text font-monospace">/</span>
    <input type="text" id="pattern" class="form-control font-monospace" placeholder="\\d+\\.\\d+" />
    <span class="input-group-text font-monospace">/</span>
    <input type="text" id="flags" class="form-control" style="max-width:80px;" placeholder="gim" value="gm" />
  </div>
  <small class="text-muted">flags: i=忽略大小写, m=多行, s=点号匹配换行</small>
</div>

<div class="mb-3">
  <label class="form-label">测试文本</label>
  <textarea id="testText" class="form-control font-monospace" rows="6" placeholder="要匹配的文本…">Hello 123 World 45.67
Test 89abc 0.5</textarea>
</div>

<button id="testBtn" class="btn btn-primary"><i class="bi bi-play-fill"></i> 测试匹配</button>

<div id="errorBox" class="alert alert-danger mt-3 d-none"></div>

<div id="result" class="mt-3 d-none">
  <div class="alert alert-info">
    找到 <strong id="matchCount">0</strong> 个匹配
  </div>
  <label class="form-label text-muted small">高亮结果</label>
  <pre id="highlighted" class="p-3 bg-light rounded font-monospace" style="white-space:pre-wrap;word-break:break-word;"></pre>
  <div id="matchList" class="mt-2"></div>
</div>

<script>
(function(){
  const CSRF = document.querySelector('meta[name="csrf-token"]').content;
  document.getElementById('testBtn').onclick = async function(){
    const pattern = document.getElementById('pattern').value;
    const text = document.getElementById('testText').value;
    const flags = document.getElementById('flags').value;
    if(!pattern || !text) return;
    document.getElementById('errorBox').classList.add('d-none');
    document.getElementById('result').classList.add('d-none');
    try {
      const fd = new FormData();
      fd.set('pattern', pattern); fd.set('text', text); fd.set('flags', flags); fd.set('csrf_token', CSRF);
      const r = await fetch('{{ url_for("regex_tester.process") }}', {method:'POST', body:fd});
      const d = await r.json();
      if(d.ok){
        document.getElementById('matchCount').textContent = d.count;
        document.getElementById('highlighted').textContent = d.highlighted;
        const list = document.getElementById('matchList');
        if(d.matches.length){
          list.innerHTML = '<label class="form-label text-muted small mt-2">匹配详情</label>' + d.matches.map((m,i)=>
            `<div class="card bg-light mb-1 p-2"><small><strong>#${i+1}</strong> "${m.match}" <span class="text-muted">[${m.start}-${m.end}]</span>${m.groups.length?' · 组: '+m.groups.map(g=>`"${g||''}"`).join(', '):''}</small></div>`
          ).join('');
        } else { list.innerHTML=''; }
        document.getElementById('result').classList.remove('d-none');
      } else {
        document.getElementById('errorBox').textContent = d.error;
        document.getElementById('errorBox').classList.remove('d-none');
      }
    } catch(e){ document.getElementById('errorBox').textContent='请求失败: '+e; document.getElementById('errorBox').classList.remove('d-none'); }
  };
})();
</script>
