<p class="text-muted">粘贴多行文本，去重、排序、统计行数。</p>

<div class="mb-3">
  <label class="form-label">输入文本（每行一条）</label>
  <textarea id="dedupInput" class="form-control font-monospace" rows="10" placeholder="一行一条数据…">apple
banana
apple
cherry
banana
date
apple</textarea>
</div>

<div class="d-flex gap-3 mb-3 flex-wrap">
  <div class="form-check">
    <input type="checkbox" id="trim" class="form-check-input" checked />
    <label class="form-check-label" for="trim">去除首尾空格</label>
  </div>
  <div class="form-check">
    <input type="checkbox" id="ignoreCase" class="form-check-input" />
    <label class="form-check-label" for="ignoreCase">忽略大小写</label>
  </div>
  <div class="form-check">
    <input type="checkbox" id="sort" class="form-check-input" />
    <label class="form-check-label" for="sort">排序输出</label>
  </div>
  <div class="form-check">
    <input type="checkbox" id="keepEmpty" class="form-check-input" />
    <label class="form-check-label" for="keepEmpty">保留空行</label>
  </div>
</div>

<button id="dedupBtn" class="btn btn-success"><i class="bi bi-funnel"></i> 去重</button>
<button id="copyBtn" class="btn btn-outline-success ms-2"><i class="bi bi-clipboard"></i> 复制结果</button>

<div id="errorBox" class="alert alert-danger mt-3 d-none"></div>

<div id="result" class="mt-3 d-none">
  <div class="alert alert-info">
    原始 <strong id="origCount">0</strong> 行 → 去重后 <strong id="uniqCount">0</strong> 行（删除 <strong id="removedCount">0</strong> 行重复）
  </div>
  <textarea id="dedupOutput" class="form-control font-monospace" rows="10" readonly style="background:#f8f9fa;"></textarea>
</div>

<script>
(function(){
  const CSRF = document.querySelector('meta[name="csrf-token"]').content;
  document.getElementById('dedupBtn').onclick = async function(){
    const text = document.getElementById('dedupInput').value;
    if(!text.trim()) return;
    document.getElementById('errorBox').classList.add('d-none');
    const fd = new FormData();
    fd.set('text', text);
    fd.set('trim', document.getElementById('trim').checked ? '1' : '');
    fd.set('ignore_case', document.getElementById('ignoreCase').checked ? '1' : '');
    fd.set('sort', document.getElementById('sort').checked ? '1' : '');
    fd.set('keep_empty', document.getElementById('keepEmpty').checked ? '1' : '');
    fd.set('csrf_token', CSRF);
    try {
      const r = await fetch('{{ url_for("text_dedup.process") }}', {method:'POST', body:fd});
      const d = await r.json();
      if(d.ok){
        document.getElementById('dedupOutput').value = d.result;
        document.getElementById('origCount').textContent = d.original_count;
        document.getElementById('uniqCount').textContent = d.unique_count;
        document.getElementById('removedCount').textContent = d.removed;
        document.getElementById('result').classList.remove('d-none');
      } else {
        document.getElementById('errorBox').textContent = d.error;
        document.getElementById('errorBox').classList.remove('d-none');
      }
    } catch(e){ document.getElementById('errorBox').textContent='请求失败: '+e; document.getElementById('errorBox').classList.remove('d-none'); }
  };
  document.getElementById('copyBtn').onclick = function(){
    const v = document.getElementById('dedupOutput').value;
    if(v){ navigator.clipboard.writeText(v); this.innerHTML='<i class="bi bi-check"></i> 已复制'; setTimeout(()=>{this.innerHTML='<i class="bi bi-clipboard"></i> 复制结果'},1500); }
  };
})();
</script>
