# /etc/nginx/sites-available/mytoolbox
# Symlink to /etc/nginx/sites-enabled/mytoolbox, then `nginx -t && systemctl reload nginx`

upstream mytoolbox_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name toolbox.example.com;            # <-- change me

    # Let's Encrypt http-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name toolbox.example.com;            # <-- change me

    client_max_body_size 30M;                   # 略大于 MAX_UPLOAD_MB

    ssl_certificate     /etc/letsencrypt/live/toolbox.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbox.example.com/privkey.pem;

    # Recommended TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — let Nginx serve them directly for speed
    location /static/ {
        alias /opt/mytoolbox/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 120s;             # long for AI generation
        proxy_pass http://mytoolbox_app;
    }
}
